<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Collector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="showCurrentLocation()">
    <div class="container">
        <header>
            <div class="header-icon"><i class="fas fa-map-marked-alt"></i></div>
            <h1>Location Data Collector</h1>
            <p class="subtitle"></p>
        </header>

        <section class="input-wrapper">
            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Name</label>
                <input type="text" id="name" placeholder="Enter Name">
            </div>

            <div class="form-group">
                <label for="lastName"><i class="fas fa-user-tag"></i> Last Name</label>
                <input type="text" id="lastName" placeholder="Enter Last Name">
            </div>

            <div class="form-group">
                <label for="no"><i class="fas fa-seedling"></i> Variety</label>
                <select id="no">
                    <option value="">Select Variety</option>
                    <option value="#51">#51</option>
                    <option value="#55">#55</option>
                    <option value="#57">#57</option>
                    <option value="#60">#60</option>
                    <option value="#61">#61</option>
                    <option value="#71">#71</option>
                    <option value="#SB">#SB</option>
                    <option value="#63">#63</option>
                </select>
            </div>

            <div class="form-group">
                <label for="location"><i class="fas fa-location-dot"></i> Location (จังหวัด)</label>
                <select id="location">
                    <option value="">-- เลือก เขต --</option>
                    <option value="NMA">NMA</option>
                    <option value="CPM">CPM</option>
                    <option value="SKT">SKT</option>
                    <option value="KPP">KPP</option>
                    <option value="SPB">SPB</option>
                    <option value="TAK">TAK</option>
                    <option value="PRE">PRE</option>
                    <option value="LPN">LPN</option>
                    <option value="LPG">LPG</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fieldNo"><i class="fas fa-ruler-combined"></i> Area (Rai)</label>
                <input type="text" id="fieldNo" placeholder="Enter Field Area">
            </div>

            <button onclick="recordLocation()">
                <i class="fas fa-satellite-dish"></i> Record Location
            </button>

            <div id="current-location" class="info-box">
                <i class="fas fa-crosshairs"></i>
                <span>Current Location: Fetching...</span>
            </div>
            <div id="status" class="info-box hidden"></div>
        </section>

        <footer>
            <p>&copy; Popporn Yingthongchai</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
